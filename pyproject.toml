# ── Lint / format Python : config unique = ruff.toml ───────────────────────
# ruff lit ruff.toml en priorité ; un bloc [tool.ruff] ici serait
# silencieusement ignoré. La politique de lint vit donc dans ruff.toml.
# Ce fichier ne porte plus que la configuration pytest.

[tool.pytest.ini_options]
testpaths = ["tests/python"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-q --tb=short"
