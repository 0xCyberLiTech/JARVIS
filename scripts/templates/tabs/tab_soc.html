  <!-- ═══ ONGLET ◈ SOC ═══ -->
  <div id="tab-soc" class="tab-content">
  <div class="hud-frame">

    <!-- Header -->
    <div class="soc-header">
      <span class="soc-title">◈ SOC — ACTIONS PROACTIVES JARVIS</span>
      <span id="soc-online-badge" class="soc-badge">⬡ CHARGEMENT</span>
      <span class="soc-spacer"></span>
      <button class="soc-btn soc-btn-cyan"   data-action="refreshSocTab">⟳ ACTUALISER</button>
      <button class="soc-btn soc-btn-purple" data-action="socNarrativeAnalysis">◈ ANALYSER</button>
      <button class="soc-btn soc-btn-amber"  id="soc-force-btn" data-action="socForceAutoban">⚡ FORCER</button>
      <button class="soc-btn soc-btn-red"    data-action="clearSocActions">🗑 VIDER</button>
    </div>

    <!-- Compteurs -->
    <div class="soc-counters">
      <div class="soc-cnt-box soc-cnt-box-cyan">
        <div id="soc-cnt-total"   class="soc-cnt-val c-cyan">—</div>
        <div class="soc-cnt-lbl">ACTIONS</div>
      </div>
      <div class="soc-cnt-box soc-cnt-box-red">
        <div id="soc-cnt-ban"     class="soc-cnt-val c-red">—</div>
        <div class="soc-cnt-lbl">BANS IP</div>
      </div>
      <div class="soc-cnt-box soc-cnt-box-amber">
        <div id="soc-cnt-restart" class="soc-cnt-val c-warn">—</div>
        <div class="soc-cnt-lbl">RESTARTS</div>
      </div>
      <div class="soc-cnt-box soc-cnt-box-ok">
        <div id="soc-cnt-ok"      class="soc-cnt-val">—</div>
        <div class="soc-cnt-lbl">SUCCÈS</div>
      </div>
      <div class="soc-cnt-box soc-cnt-box-fail">
        <div id="soc-cnt-fail"    class="soc-cnt-val c-red">—</div>
        <div class="soc-cnt-lbl">ÉCHECS</div>
      </div>
      <div class="soc-cnt-box soc-cnt-box-ids">
        <div id="soc-cnt-ids"     class="soc-cnt-val-ids">—</div>
        <div class="soc-cnt-lbl">◈ IDS</div>
      </div>
    </div>

    <!-- Analyse narrative -->
    <div id="soc-narrative" class="soc-narrative"></div>

    <!-- Graphiques activité — cartes semaines -->
    <div class="soc-activity">
      <div class="soc-act-header">
        <span class="soc-section-lbl">ACTIVITÉ — 30 JOURS</span>
        <button id="soc-prev-month" class="soc-month-btn" data-action="socMonthNav" data-args='[-1]'>◂</button>
        <span   id="soc-month-label" class="soc-month-lbl">—</span>
        <button id="soc-next-month" class="soc-month-btn" data-action="socMonthNav" data-args='[1]'>▸</button>
      </div>
      <div id="soc-weeks-row" class="soc-weeks-row"></div>
      <!-- Graphique de détail — pleine largeur -->
      <div id="soc-detail-wrap" class="soc-detail-wrap">
        <div class="soc-detail-hdr">
          <span id="soc-detail-title" class="soc-detail-title">—</span>
          <span id="soc-detail-info"  class="soc-detail-info">—</span>
        </div>
        <canvas id="soc-chart-detail" width="700" height="120" class="soc-chart-main"></canvas>
        <div id="soc-day-label" class="soc-day-label">
          Cliquer sur un point pour voir le détail horaire &nbsp;·&nbsp;
          <span id="soc-day-label-date" class="soc-day-accent"></span>
        </div>
        <canvas id="soc-chart-day" width="700" height="80" class="soc-chart-day"></canvas>
      </div>
    </div>

    <!-- Journal des actions -->
    <div class="soc-jrnl-lbl">JOURNAL DES ACTIONS — 50 DERNIÈRES</div>
    <div id="soc-actions-list" class="soc-jrnl-list">
      <div class="soc-jrnl-empty">Aucune action enregistrée.</div>
    </div>

  </div><!-- end hud-frame -->
  </div><!-- end tab-soc -->
