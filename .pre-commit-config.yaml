# .pre-commit-config.yaml — JARVIS · 0xCyberLiTech
# Créé 2026-05-14 (chantier dette technique · Action #2)
# Étendu 2026-05-15 (hook pre-push pytest · chantier dette).
#
# Hooks 100% LOCAUX : utilisent ruff + eslint + pytest déjà installés sur la machine.
# Aucun téléchargement réseau (pas de repo distant pre-commit).
# Comportement BLOQUANT : un commit/push est refusé si une vérif échoue.
#
# Installation des hooks (à faire 1 fois après clone) :
#   pre-commit install                   # → installe le hook pre-commit
#   pre-commit install --hook-type pre-push   # → installe le hook pre-push
#
# Bypass exceptionnel : git commit --no-verify · git push --no-verify

repos:
  - repo: local
    hooks:
      # ── Ruff — lint Python (utilise ruff.toml du repo) ──────────
      - id: ruff-check
        name: ruff check (Python)
        entry: python -m ruff check
        language: system
        types: [python]
        require_serial: true
        stages: [pre-commit]

      # ── ESLint — lint JS (utilise eslint.config.js du repo) ─────
      # Couvre TOUS les modules JS applicatifs : 4 historiques (jarvis_main,
      # jarvis_mixing, recorder, voice_print) + les 18 modules extraits dans
      # scripts/static/js/ (chantier refactor JS 2026-05-14/15). Aligné avec
      # la liste `files:` de eslint.config.js — cohérence pre-commit/lint.
      - id: eslint
        name: eslint (JS)
        entry: npx --no-install eslint
        language: system
        files: ^scripts/static/(jarvis_main|jarvis_mixing|recorder|voice_print)\.js$|^scripts/static/js/.+\.js$
        require_serial: true
        stages: [pre-commit]

      # ── Pytest + GATE couverture — suite tests Python (stage pre-push uniquement) ─
      # Lance la suite unitaire (1952 tests au 2026-06-23) avant chaque push.
      # Bloque si tests rouges OU si la couverture régresse sous le plancher.
      # GATE --cov-fail-under (ajouté 2026-06-23, audit adverse dimension Code&tests) :
      # la couverture n'était PAS gatée côté JARVIS (asymétrie vs SOC gaté à 88) → un
      # module pouvait régresser sans garde-fou. Couverture RÉELLE ≈ 81,8–82,0 % (9886 stmts ;
      # léger flottement ±0,2 pt selon l'env — gardes torch/CUDA/ollama ; s'affiche « 82 % »
      # par arrondi entier). Plancher posé à 81 = anti-régression honnête AVEC marge ~1 pt sous
      # le réel (même philosophie que SOC : gate 88 pour un réel 88,7),
      # pour ne PAS flaker sur 0,01 % de bruit de mesure tout en bloquant une VRAIE régression
      # (un module perdant ses tests chute de plusieurs points). Relever le plancher uniquement
      # par action documentée (cf. feedback_scores_marbre). Pas en pre-commit (trop lent).
      - id: pytest
        name: pytest + gate couverture (suite tests Python)
        entry: python -m pytest -q --tb=short --cov=scripts --cov-report=term-missing:skip-covered --cov-fail-under=81
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # ── Gardiens DOCTRINE (stage pre-push) — anti-dérive LLM-config + termes périmés doc ──
      # Ajout 2026-06-24 (re-audit doctrine F4) : ces gardiens ne tournaient QUE dans audit-all
      # (manuel) → une dérive (modèle LLM incohérent / hardcodé UI, « phi4 » ré-apparu dans la doc)
      # passait le push sans alerte. On les gate au pre-push : statiques, 100% LOCAUX, 0 réseau.
      # Source unique : les outils vivent dans DEV/TOOLS (chemin relatif depuis la racine JARVIS,
      # où pre-commit s'exécute). doc-drift cible `docs` (= JARVIS/docs, aligné sur audit-all §7).
      - id: jarvis-llm-audit
        name: jarvis-llm-audit (cohérence config LLM, anti-hardcode)
        entry: python ../DEV/TOOLS/jarvis-llm-audit/jarvis-llm-audit.py --no-ollama
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: doc-drift-lint-jarvis
        name: doc-drift-lint (termes périmés — JARVIS/docs)
        entry: bash ../DEV/TOOLS/doc-drift-lint/doc-drift-lint.sh docs
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
